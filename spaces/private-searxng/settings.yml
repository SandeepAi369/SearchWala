use_default_settings: true

server:
  bind_address: "0.0.0.0:7860"
  secret_key: "CHANGE_ME_TO_A_RANDOM_SECRET_KEY"
  limiter: false
  image_proxy: false
  public_instance: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

ui:
  static_use_hash: true

enabled_plugins:
  - 'Hash plugin'
  - 'Self Information'
  - 'Tracker URL remover'

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
